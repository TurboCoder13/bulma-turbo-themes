name: Security - CodeQL Code Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: 🔍 CodeQL Security Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@92c522aaa6f53af082553dedc1596c80b71aba33
        if: ${{ !env.ACT }}
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            codeload.github.com:443
            github-releases.githubusercontent.com:443
            release-assets.githubusercontent.com:443
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - uses: github/codeql-action/init@d88a5540c3fd916f4e15b7744d287a124278e065
        with:
          languages: javascript,typescript
      - uses: github/codeql-action/autobuild@d88a5540c3fd916f4e15b7744d287a124278e065
      - uses: github/codeql-action/analyze@d88a5540c3fd916f4e15b7744d287a124278e065
        with:
          category: "/language:all"
